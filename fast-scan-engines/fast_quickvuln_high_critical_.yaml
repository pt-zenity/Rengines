   'intensity': 'normal',                                                                 +
   'rate_limit': 300,                                                                     +
   'retries': 0,                                                                          +
   'timeout': 4,                                                                          +
   'fetch_llm_report': false,                                                             +
   'nuclei': {                                                                            +
     'use_nuclei_config': false,                                                          +
