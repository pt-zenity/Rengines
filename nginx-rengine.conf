server {
    listen                                          8082 default;
    listen                                          [::]:8082 default;
    server_name                                     rengine recon;
    return                                          301 https://$host$request_uri;
}


server {
    listen                                          9191 ssl;
    listen                                          [::]:9191 ssl;
    http2                                           on;
    server_name                                     rengine recon;

    charset                                         utf-8;
    keepalive_timeout                               70;

    client_max_body_size                            800M;

    # Use Docker internal DNS resolver with short TTL to handle container IP changes on reboot
    resolver                                        127.0.0.11 valid=10s ipv6=off;
    resolver_timeout                                5s;

    # Enable gzip compression
    gzip                                            on;
    gzip_vary                                       on;
    gzip_proxied                                    any;
    gzip_comp_level                                 6;
    gzip_types                                      text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    location / {
        set $upstream                               http://web:8000;
        proxy_pass                                  $upstream;

        proxy_read_timeout                          120;
        proxy_connect_timeout                       10;
        proxy_send_timeout                          120;
        proxy_redirect                              off;

        proxy_http_version                          1.1;
        proxy_set_header                            Connection "";

        proxy_set_header                            Host $host;
        proxy_set_header                            X-Real-IP $remote_addr;
        proxy_set_header                            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header                            X-Forwarded-Proto $scheme;

        # Buffer settings for performance
        proxy_buffering                             on;
        proxy_buffer_size                           16k;
        proxy_buffers                               8 16k;
        proxy_busy_buffers_size                     32k;
    }

    location /staticfiles/ {
        alias /home/rengine/rengine/staticfiles/;
        # Cache static files aggressively
        expires                                     30d;
        add_header                                  Cache-Control "public, immutable";
        access_log                                  off;
    }

    # WebSocket support
    location /ws/ {
        set $ws_upstream                            http://web:8000;
        proxy_pass                                  $ws_upstream;
        proxy_http_version                          1.1;
        proxy_set_header                            Upgrade $http_upgrade;
        proxy_set_header                            Connection "upgrade";
        proxy_set_header                            Host $host;
        proxy_set_header                            X-Real-IP $remote_addr;
        proxy_set_header                            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header                            X-Forwarded-Proto $scheme;
        proxy_read_timeout                          86400;  # 24 hours
    }

    location /api/tool/ollama/ {
        set $ollama_upstream                        http://web:8000;
        proxy_pass                                  $ollama_upstream;
        proxy_http_version                          1.1;
        proxy_set_header                            Connection '';
        proxy_buffering                             off;
        proxy_cache                                 off;
        proxy_read_timeout                          600s;  # 10 minutes timeout
    }

    location /media/ {
        alias /home/rengine/scan_results/;
    }

    ssl_protocols                                   TLSv1.2 TLSv1.3;

    ssl_certificate                                 /etc/nginx/certs/rengine.pem;
    ssl_certificate_key                             /etc/nginx/certs/rengine_rsa.key;
    ssl_trusted_certificate                         /etc/nginx/certs/rengine_chain.pem;

    ssl_ciphers                                     '!EDH:!EXP:!SHA:!DSS:EECDH+aRSA+AESGCM:EECDH+aRSA+SHA384:EECDH+aRSA+SHA256';
    ssl_prefer_server_ciphers                       on;

    ssl_ecdh_curve                                  secp384r1:X25519:prime256v1;

    ssl_session_cache                               shared:SSL:20m;
    ssl_session_timeout                             10m;
    ssl_session_tickets                             off;

    ssl_stapling                                    off;
}
