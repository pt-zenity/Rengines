id: livewire-component-exposure

info:
  name: Livewire Component JS File Accessible
  author: pt-zenity
  severity: medium
  description: |
    Laravel Livewire JavaScript library is publicly accessible.
    This confirms a Livewire-based application, enabling targeted attack
    enumeration against Livewire endpoints and component state.
  reference:
    - https://livewire.laravel.com
  tags: livewire,laravel,exposure,debug

http:
  - method: GET
    path:
      - "{{BaseURL}}/livewire/livewire.js"
      - "{{BaseURL}}/livewire/livewire.min.js"
      - "{{BaseURL}}/vendor/livewire/livewire.js"
      - "{{BaseURL}}/vendor/livewire/livewire.min.js"

    stop-at-first-match: false

    # Must return 200 with actual JS content containing Livewire code
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "text/javascript"
          - "application/javascript"
        condition: or

      - type: word
        part: body
        words:
          - "window.livewire"
          - "window.Livewire"
          - "Livewire.start"
          - "livewire/message"
        condition: or
