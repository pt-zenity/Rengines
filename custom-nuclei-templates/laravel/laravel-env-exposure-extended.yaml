id: laravel-env-exposure-extended

info:
  name: Laravel .env File Extended Exposure
  author: pt-zenity
  severity: critical
  description: |
    Laravel application is exposing its .env configuration file which contains
    sensitive credentials including database passwords, API keys, APP_KEY,
    JWT secrets, and other environment variables.
  reference:
    - https://laravel.com/docs/configuration
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-200
  tags: laravel,env,exposure,critical,config

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/.env.bak"
      - "{{BaseURL}}/.env.example"
      - "{{BaseURL}}/public/.env"
      - "{{BaseURL}}/storage/.env"

    stop-at-first-match: false

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "APP_KEY="
          - "APP_ENV="
          - "DB_PASSWORD="
          - "DB_HOST="
        condition: or

    extractors:
      - type: regex
        part: body
        regex:
          - "APP_KEY=[base64:A-Za-z0-9+/=]{20,}"
          - "DB_PASSWORD=.{1,50}"
          - "DB_USERNAME=.{1,50}"
          - "MAIL_PASSWORD=.{1,50}"
          - "[A-Z_]+=.{10,100}"
