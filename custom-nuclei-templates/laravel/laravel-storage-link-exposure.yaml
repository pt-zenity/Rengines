id: laravel-storage-link-exposure

info:
  name: Laravel Storage / Log File Exposure
  author: pt-zenity
  severity: high
  description: |
    Laravel application is exposing files in the storage directory or log files.
    This can allow attackers to access uploaded files, backup files, logs,
    or even execute uploaded PHP webshells if the directory is misconfigured.
  reference:
    - https://laravel.com/docs/filesystem
  classification:
    cwe-id: CWE-552
  tags: laravel,storage,exposure,file-access

http:
  - method: GET
    path:
      - "{{BaseURL}}/storage/logs/laravel.log"
      - "{{BaseURL}}/storage/logs/laravel-{{date}}.log"
      - "{{BaseURL}}/storage/app/public"

    payloads:
      date:
        - "2024-01-01"
        - "2025-01-01"
        - "2026-01-01"

    stop-at-first-match: false

    # Must return 200 AND contain actual log content - directory listing OR laravel log entries
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "[2024"
          - "[2025"
          - "[2026"
          - "production.ERROR"
          - "local.ERROR"
          - "Stack trace:"
          - "Index of /"
        condition: or

  - method: GET
    path:
      - "{{BaseURL}}/storage"
      - "{{BaseURL}}/uploads"
      - "{{BaseURL}}/public/uploads"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "Index of /"
          - "[DIR]"
          - "Parent Directory"
        condition: or
