id: swagger-auth-bypass

info:
  name: Swagger API Authentication Bypass / Unauthenticated JSON Data Exposure
  author: pt-zenity
  severity: high
  description: |
    Swagger/OpenAPI endpoints are accessible without authentication and
    returning JSON data with sensitive fields. Test endpoints and debug APIs often
    bypass authentication middleware in development configurations.
  reference:
    - https://owasp.org/www-project-api-security/
  classification:
    cwe-id: CWE-306
  tags: swagger,api,auth-bypass,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/users"
      - "{{BaseURL}}/api/v2/users"
      - "{{BaseURL}}/api/admin/users"
      - "{{BaseURL}}/api/v1/admin"
      - "{{BaseURL}}/api/test"
      - "{{BaseURL}}/api/debug"
      - "{{BaseURL}}/api/internal"
      - "{{BaseURL}}/api/private"
      - "{{BaseURL}}/api/system"
      - "{{BaseURL}}/api/metrics"
      - "{{BaseURL}}/api/actuator"
      - "{{BaseURL}}/api/actuator/env"
      - "{{BaseURL}}/api/actuator/beans"

    headers:
      Accept: "application/json"

    stop-at-first-match: false

    # Must return 200 JSON with non-trivial content containing real sensitive data fields
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "application/json"

      - type: dsl
        dsl:
          - "len(body) > 20"

      - type: regex
        part: body
        regex:
          # Real sensitive data — email, password hash, token, role info
          - '"(email|username|password|token|api_key|secret)"\s*:\s*"[^"]{3,}'
          - '"(role|admin|is_admin|superuser)"\s*:\s*(true|"admin"|1)'
          - '"(id|uid|user_id)"\s*:\s*\d+'
        condition: or
