id: swagger-ui-exposure

info:
  name: Swagger UI / OpenAPI Documentation Exposed
  author: pt-zenity
  severity: medium
  description: |
    Swagger UI or OpenAPI documentation is publicly accessible.
    This exposes all API endpoints, parameters, authentication methods,
    and potentially sensitive business logic. Can aid attackers in
    enumerating and targeting API endpoints.
  reference:
    - https://swagger.io/tools/swagger-ui/
  tags: swagger,openapi,exposure,api

http:
  - method: GET
    path:
      - "{{BaseURL}}/swagger"
      - "{{BaseURL}}/swagger-ui"
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/swagger/index.html"
      - "{{BaseURL}}/swagger/ui"
      - "{{BaseURL}}/swagger/v1"
      - "{{BaseURL}}/swagger/v2"
      - "{{BaseURL}}/swagger/v3"
      - "{{BaseURL}}/api/swagger"
      - "{{BaseURL}}/api/swagger-ui"
      - "{{BaseURL}}/api/swagger.json"
      - "{{BaseURL}}/api/swagger.yaml"
      - "{{BaseURL}}/api/docs"
      - "{{BaseURL}}/api/documentation"
      - "{{BaseURL}}/docs"
      - "{{BaseURL}}/docs/index.html"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/api-docs/swagger.json"
      - "{{BaseURL}}/v2/api-docs"
      - "{{BaseURL}}/v3/api-docs"
      - "{{BaseURL}}/openapi"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/openapi.yaml"

    stop-at-first-match: false

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "swagger-ui"
          - "SwaggerUI"
          - "swagger.io"
          - "Swagger UI"
        condition: or

      - type: word
        part: body
        words:
          - '"swagger":'
          - '"openapi":'
          - '"info":'
          - '"paths":'
        condition: and

      - type: word
        part: header
        words:
          - "swagger-ui"
          - "swagger.json"
        condition: or

    extractors:
      - type: regex
        part: body
        regex:
          - '"(title|version|description)"\s*:\s*"[^"]{1,100}"'
          - '"(basePath|host|servers)"\s*:\s*[\["]'
