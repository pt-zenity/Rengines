id: react-redux-state-exposure

info:
  name: React Redux State / Window Object Sensitive Data Exposure
  author: pt-zenity
  severity: high
  description: |
    React application is exposing sensitive data through window.__INITIAL_STATE__,
    window.__PRELOADED_STATE__, or window.__REDUX_STATE__. These server-side
    rendered state objects can contain auth tokens, user data, API keys,
    session information, and internal configuration.
  reference:
    - https://redux.js.org/usage/server-rendering
  classification:
    cwe-id: CWE-312
  tags: react,redux,state,exposure,high

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/app"
      - "{{BaseURL}}/dashboard"

    stop-at-first-match: false

    # Must return 200 with HTML AND contain actual sensitive state objects with real values
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "text/html"

      - type: regex
        part: body
        regex:
          # State object must exist AND contain a sensitive token/key value (not just an empty object)
          - "window\\.__(?:INITIAL_STATE|PRELOADED_STATE|REDUX_STATE|APP_STATE)__\\s*=\\s*\\{[^}]{10,}"
          - "\"(?:token|apiKey|authToken|accessToken|jwt)\":\\s*\"[A-Za-z0-9_\\-\\.]{20,}\""
          - "\"(?:password|secret|private_key)\":\\s*\"[^\"]{4,}\""
        condition: or

    extractors:
      - type: regex
        part: body
        regex:
          - "\"(token|apiKey|authToken|jwt|secret)\":\\s*\"([A-Za-z0-9_.\\-]{10,})\""
          - "\"(email|username|name|role)\":\\s*\"([^\"]{1,100})\""
