id: nextjs-debug-page

info:
  name: Next.js Debug / Error Page Exposed
  author: pt-zenity
  severity: medium
  description: |
    Next.js application is exposing internal error/debug information.
    This can reveal stack traces, source file paths, environment variables,
    and internal infrastructure details to unauthenticated users.
  reference:
    - https://nextjs.org/docs/advanced-features/error-handling
  tags: nextjs,debug,exposure,info-leak

http:
  - method: GET
    path:
      - "{{BaseURL}}/_next/static/chunks/pages/_error.js"
      - "{{BaseURL}}/_next/static/development/_error.js"
      - "{{BaseURL}}/404"
      - "{{BaseURL}}/500"

    stop-at-first-match: false

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "__NEXT_DATA__"
          - "_next/static"
          - "getServerSideProps"
        condition: or

      - type: word
        part: body
        words:
          - "at Object.getServerSideProps"
          - "at Module.render"
          - "webpack-internal://"
          - "node_modules/next"
        condition: or

      - type: word
        part: body
        words:
          - "Application error: a client-side exception has occurred"
          - "ChunkLoadError"
          - "Loading chunk"
        condition: or
